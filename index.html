<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GroomHub — Login</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="page">
      <section class="card" role="region" aria-label="Login card">
        <header class="brand">
          <div class="logo" aria-hidden="true">G</div>
          <div class="brand-text">
            <h1>GROOMHUB</h1>
            <p>Student Grooming Ecosystem</p>
          </div>
        </header>

        <div class="hero">
          <div class="pill">WCAG AA • Constraint-first Scheduling</div>
          <h2>Log in to your dashboard</h2>
          <p class="muted">
            This is a static preview page (no backend). It’s ready for you to wire into your internet login later.
          </p>
        </div>

        <form id="loginForm" class="form" autocomplete="on">
          <label class="field">
            <span class="label">Email</span>
            <input id="email" name="email" type="email" placeholder="name@university.edu" required />
          </label>

          <label class="field">
            <span class="label">Password</span>
            <input id="password" name="password" type="password" placeholder="Create a strong password" required />
          </label>

          <div class="row">
            <label class="check">
              <input id="remember" name="remember" type="checkbox" />
              <span>Remember me</span>
            </label>
            <a class="link" href="#" id="forgotLink">Forgot?</a>
          </div>

          <button class="btn" type="submit">Log in</button>

          <p class="hint" id="status" role="status" aria-live="polite"></p>
        </form>

        <div class="divider" aria-hidden="true"></div>

        <div class="actions">
          <a class="btn secondary" href="#" id="demoLogin">Continue as demo</a>
          <a class="btn ghost" href="#" id="signupLink">Create account</a>
        </div>

        <footer class="foot">
          <span>© <span id="year"></span> GroomHub</span>
          <span class="muted">Hustle. Style. Success.</span>
        </footer>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
