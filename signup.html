<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GroomHub — Create account</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>

    <main class="page">
      <section class="card" role="region" aria-label="Signup card">
        <header class="brand">
          <div class="logo" aria-hidden="true">G</div>
          <div class="brand-text">
            <h1>GROOMHUB</h1>
            <p>Create your account</p>
          </div>
        </header>

        <div class="hero">
          <div class="pill">Built-in DB (localStorage) • WCAG-friendly form</div>
          <h2>Register to access your dashboard</h2>
          <p class="muted">This static prototype stores accounts in your browser only.</p>
        </div>

        <form id="signupForm" class="form" autocomplete="on">
          <label class="field">
            <span class="label">Full name (optional)</span>
            <input id="name" name="name" type="text" placeholder="e.g., Thandi M." maxlength="80" />
          </label>

          <label class="field">
            <span class="label">Email</span>
            <input id="signupEmail" name="email" type="email" placeholder="name@university.edu" required />
          </label>

          <label class="field">
            <span class="label">Password</span>
            <input id="signupPassword" name="password" type="password" placeholder="Create a strong password" required />
          </label>

          <label class="field">
            <span class="label">Confirm password</span>
            <input id="confirmPassword" name="confirmPassword" type="password" placeholder="Re-enter your password" required />
          </label>

          <div class="row">
            <div id="signupStatus" class="hint" role="status" aria-live="polite"></div>
          </div>

          <button class="btn" type="submit">Create account</button>
        </form>

        <div class="divider" aria-hidden="true"></div>

        <div class="actions">
          <a class="btn ghost" href="./index.html" id="backToLogin">Back to login</a>
        </div>

        <footer class="foot">
          <span>© <span id="year"></span> GroomHub</span>
          <span class="muted">Hustle. Style. Success.</span>
        </footer>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
